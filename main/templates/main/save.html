<section class="py-20 bg-gray-900">
    <div class="max-w-7xl mx-auto px-4">

        <h2 class="text-center text-3xl font-bold text-white mb-12">
            Our Partners
        </h2>

        <div class="overflow-hidden relative">
            <div id="partner-slider" class="flex gap-16 whitespace-nowrap animate-scroll">
                
                {% for partner in partners %}
                <div class="flex items-center justify-center flex-shrink-0 opacity-70 hover:opacity-100 transition">
                    <img src="{{ partner.logo.url }}" class="h-14 object-contain grayscale hover:grayscale-0 transition" alt="{{ partner.name }}">
                </div>
                {% endfor %}

                <!-- Duplicate for seamless infinite loop -->
                {% for partner in partners %}
                <div class="flex items-center justify-center flex-shrink-0 opacity-70 hover:opacity-100 transition">
                    <img src="{{ partner.logo.url }}" class="h-14 object-contain grayscale hover:grayscale-0 transition" alt="{{ partner.name }}">
                </div>
                {% endfor %}

            </div>
        </div>

    </div>
</section>
