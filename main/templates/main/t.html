  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfinityBoard - Professional Whiteboard</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    
    <!-- Fabric.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- FileSaver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            height: 56px;
            background: white;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--gray-800);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), #ec4899);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--gray-100);
            color: var(--gray-700);
        }

        .btn-secondary:hover {
            background: var(--gray-200);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            background: var(--gray-100);
            color: var(--gray-600);
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: var(--gray-200);
            color: var(--gray-800);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            background: #e5e7eb;
        }

        .canvas-container canvas {
            position: absolute !important;
            top: 0;
            left: 0;
        }

        /* Left Toolbar */
        .toolbar-left {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            border-radius: 16px;
            padding: 10px;
            box-shadow: var(--shadow-xl);
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 50;
        }

        .tool-btn {
            width: 42px;
            height: 42px;
            border: none;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-500);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: var(--gray-100);
            color: var(--gray-700);
        }

        .tool-btn.active {
            background: var(--primary);
            color: white;
        }

        .divider {
            height: 1px;
            background: var(--gray-200);
            margin: 6px 0;
        }

        /* Bottom Toolbar */
        .toolbar-bottom {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 16px;
            padding: 10px 16px;
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 50;
        }

        .toolbar-divider {
            width: 1px;
            height: 28px;
            background: var(--gray-200);
        }

        /* Color Picker */
        .color-picker-wrapper {
            position: relative;
        }

        .color-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 0 2px var(--gray-300);
            cursor: pointer;
        }

        .color-dropdown {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 10px;
            background: white;
            border-radius: 12px;
            padding: 12px;
            box-shadow: var(--shadow-xl);
            display: none;
            width: 200px;
            z-index: 100;
        }

        .color-dropdown.show {
            display: block;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }

        .color-swatch {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .color-swatch:hover {
            transform: scale(1.15);
        }

        .color-swatch.active {
            border-color: var(--gray-800);
        }

        .color-input-row {
            display: flex;
            gap: 8px;
        }

        .color-input-row input[type="color"] {
            flex: 1;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Stroke Width */
        .stroke-dropdown {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 10px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--shadow-xl);
            display: none;
            width: 220px;
            z-index: 100;
        }

        .stroke-dropdown.show {
            display: block;
        }

        .dropdown-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gray-500);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: var(--gray-200);
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }

        .slider-value {
            min-width: 40px;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--gray-700);
            text-align: right;
        }

        /* Background Panel */
        .bg-dropdown {
            position: absolute;
            bottom: 100%;
            right: 0;
            margin-bottom: 10px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--shadow-xl);
            display: none;
            width: 260px;
            z-index: 100;
        }

        .bg-dropdown.show {
            display: block;
        }

        .bg-colors {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            margin-bottom: 16px;
        }

        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .pattern-item {
            aspect-ratio: 1;
            border-radius: 8px;
            border: 2px solid var(--gray-200);
            cursor: pointer;
            overflow: hidden;
            transition: all 0.2s;
        }

        .pattern-item:hover {
            border-color: var(--primary);
        }

        .pattern-item.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3);
        }

        /* Zoom Controls */
        .zoom-controls {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: white;
            border-radius: 10px;
            padding: 6px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 50;
        }

        .zoom-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-600);
            transition: all 0.2s;
        }

        .zoom-btn:hover {
            background: var(--gray-100);
        }

        .zoom-value {
            min-width: 50px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--gray-700);
        }

        /* Trading Tools Submenu */
        .submenu-wrapper {
            position: relative;
        }

        .submenu {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 10px;
            background: white;
            border-radius: 12px;
            padding: 12px;
            box-shadow: var(--shadow-xl);
            display: none;
            min-width: 280px;
            z-index: 100;
        }

        .submenu.show {
            display: block;
        }

        .submenu-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--gray-500);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .submenu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }

        .submenu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 4px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.65rem;
            color: var(--gray-600);
            text-align: center;
            transition: all 0.2s;
        }

        .submenu-item:hover {
            background: var(--gray-100);
            color: var(--primary);
        }

        .submenu-item i {
            font-size: 1rem;
        }

        /* File Dropdown */
        .dropdown-wrapper {
            position: relative;
        }

        .file-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 4px;
            background: white;
            border-radius: 12px;
            padding: 8px;
            box-shadow: var(--shadow-xl);
            display: none;
            min-width: 180px;
            z-index: 100;
        }

        .file-dropdown.show {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--gray-700);
            transition: all 0.2s;
        }

        .dropdown-item:hover {
            background: var(--gray-100);
        }

        .dropdown-item i {
            width: 16px;
            color: var(--gray-500);
        }

        .dropdown-divider {
            height: 1px;
            background: var(--gray-200);
            margin: 4px 0;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: var(--gray-800);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            box-shadow: var(--shadow-xl);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .toast.info { background: linear-gradient(135deg, #6366f1, #4f46e5); }

        /* Loading Screen */
        .loading {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s;
        }

        .loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-icon {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .loading-text {
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
        }

        /* Current Tool Indicator */
        .current-tool {
            position: absolute;
            top: 72px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gray-800);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .current-tool.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="loading-icon">
            <i class="fas fa-infinity"></i>
        </div>
        <div class="loading-text">InfinityBoard</div>
    </div>

    <!-- App -->
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-infinity"></i>
                </div>
                <span>InfinityBoard</span>
            </div>

            <div class="header-actions">
                <button class="btn-icon" id="undoBtn" title="Undo (Ctrl+Z)">
                    <i class="fas fa-undo"></i>
                </button>
                <button class="btn-icon" id="redoBtn" title="Redo (Ctrl+Y)">
                    <i class="fas fa-redo"></i>
                </button>

                <div class="dropdown-wrapper">
                    <button class="btn btn-secondary" id="fileBtn">
                        <i class="fas fa-file"></i>
                        File
                        <i class="fas fa-chevron-down" style="font-size: 0.7rem; margin-left: 4px;"></i>
                    </button>
                    <div class="file-dropdown" id="fileDropdown">
                        <div class="dropdown-item" id="newBtn">
                            <i class="fas fa-plus"></i>
                            New Board
                        </div>
                        <div class="dropdown-item" id="saveBtn">
                            <i class="fas fa-save"></i>
                            Save
                        </div>
                        <div class="dropdown-item" id="loadBtn">
                            <i class="fas fa-folder-open"></i>
                            Load
                        </div>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-item" id="exportPng">
                            <i class="fas fa-image"></i>
                            Export PNG
                        </div>
                        <div class="dropdown-item" id="exportPdf">
                            <i class="fas fa-file-pdf"></i>
                            Export PDF
                        </div>
                        <div class="dropdown-item" id="exportJson">
                            <i class="fas fa-code"></i>
                            Export JSON
                        </div>
                    </div>
                </div>

                <button class="btn btn-primary" id="shareBtn">
                    <i class="fas fa-share-alt"></i>
                    Share
                </button>
            </div>
        </header>

        <!-- Main -->
        <main class="main">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="canvas"></canvas>
            </div>

            <!-- Current Tool Indicator -->
            <div class="current-tool" id="currentTool">Select</div>

            <!-- Left Toolbar -->
            <div class="toolbar-left">
                <button class="tool-btn active" data-tool="select" title="Select (V)">
                    <i class="fas fa-mouse-pointer"></i>
                </button>
                <button class="tool-btn" data-tool="pan" title="Pan (H)">
                    <i class="fas fa-hand-paper"></i>
                </button>

                <div class="divider"></div>

                <button class="tool-btn" data-tool="pencil" title="Pencil (P)">
                    <i class="fas fa-pencil-alt"></i>
                </button>
                <button class="tool-btn" data-tool="brush" title="Brush (B)">
                    <i class="fas fa-paint-brush"></i>
                </button>
                <button class="tool-btn" data-tool="highlighter" title="Highlighter">
                    <i class="fas fa-highlighter"></i>
                </button>
                <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
                    <i class="fas fa-eraser"></i>
                </button>

                <div class="divider"></div>

                <button class="tool-btn" data-tool="text" title="Text (T)">
                    <i class="fas fa-font"></i>
                </button>
                <button class="tool-btn" data-tool="sticky" title="Sticky Note">
                    <i class="fas fa-sticky-note"></i>
                </button>
                <button class="tool-btn" data-tool="image" title="Add Image">
                    <i class="fas fa-image"></i>
                </button>
            </div>

            <!-- Bottom Toolbar -->
            <div class="toolbar-bottom">
                <!-- Shapes -->
                <button class="tool-btn" data-tool="line" title="Line (L)">
                    <i class="fas fa-minus"></i>
                </button>
                <button class="tool-btn" data-tool="arrow" title="Arrow">
                    <i class="fas fa-long-arrow-alt-right"></i>
                </button>
                <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
                    <i class="far fa-square"></i>
                </button>
                <button class="tool-btn" data-tool="circle" title="Circle (C)">
                    <i class="far fa-circle"></i>
                </button>
                <button class="tool-btn" data-tool="triangle" title="Triangle">
                    <i class="fas fa-play" style="transform: rotate(-90deg); font-size: 0.85rem;"></i>
                </button>
                <button class="tool-btn" data-tool="star" title="Star">
                    <i class="far fa-star"></i>
                </button>

                <div class="toolbar-divider"></div>

                <!-- Trading Tools -->
                <div class="submenu-wrapper">
                    <button class="tool-btn" id="tradingBtn" title="Trading Tools">
                        <i class="fas fa-chart-line"></i>
                    </button>
                    <div class="submenu" id="tradingSubmenu">
                        <div class="submenu-title">Trading Tools</div>
                        <div class="submenu-grid">
                            <div class="submenu-item" data-tool="trendline">
                                <i class="fas fa-chart-line"></i>
                                <span>Trendline</span>
                            </div>
                            <div class="submenu-item" data-tool="hline">
                                <i class="fas fa-grip-lines"></i>
                                <span>H-Line</span>
                            </div>
                            <div class="submenu-item" data-tool="vline">
                                <i class="fas fa-grip-lines-vertical"></i>
                                <span>V-Line</span>
                            </div>
                            <div class="submenu-item" data-tool="ray">
                                <i class="fas fa-slash"></i>
                                <span>Ray</span>
                            </div>
                            <div class="submenu-item" data-tool="channel">
                                <i class="bi bi-distribute-vertical"></i>
                                <span>Channel</span>
                            </div>
                            <div class="submenu-item" data-tool="fib">
                                <i class="fas fa-ruler-vertical"></i>
                                <span>Fib Retrace</span>
                            </div>
                            <div class="submenu-item" data-tool="fibext">
                                <i class="fas fa-ruler-combined"></i>
                                <span>Fib Extend</span>
                            </div>
                            <div class="submenu-item" data-tool="gann">
                                <i class="fas fa-border-all"></i>
                                <span>Gann Box</span>
                            </div>
                            <div class="submenu-item" data-tool="pitchfork">
                                <i class="fas fa-code-branch"></i>
                                <span>Pitchfork</span>
                            </div>
                            <div class="submenu-item" data-tool="elliott">
                                <i class="fas fa-water"></i>
                                <span>Elliott</span>
                            </div>
                            <div class="submenu-item" data-tool="headshoulders">
                                <i class="fas fa-mountain"></i>
                                <span>H&S</span>
                            </div>
                            <div class="submenu-item" data-tool="measure">
                                <i class="fas fa-ruler"></i>
                                <span>Measure</span>
                            </div>
                        </div>
                    </div>
                </div>

                <button class="tool-btn" data-tool="path" title="Path Tool">
                    <i class="fas fa-bezier-curve"></i>
                </button>

                <div class="toolbar-divider"></div>

                <!-- Color -->
                <div class="color-picker-wrapper">
                    <div class="color-btn" id="colorBtn" style="background: #6366f1;"></div>
                    <div class="color-dropdown" id="colorDropdown">
                        <div class="dropdown-label">Colors</div>
                        <div class="color-grid" id="colorGrid"></div>
                        <div class="color-input-row">
                            <input type="color" id="customColor" value="#6366f1">
                        </div>
                    </div>
                </div>

                <!-- Stroke Width -->
                <div class="submenu-wrapper">
                    <button class="tool-btn" id="strokeBtn" title="Stroke Width">
                        <i class="fas fa-minus" style="font-size: 1.2rem;"></i>
                    </button>
                    <div class="stroke-dropdown" id="strokeDropdown">
                        <div class="dropdown-label">Stroke Width</div>
                        <div class="slider-row">
                            <input type="range" class="slider" id="strokeSlider" min="1" max="50" value="3">
                            <span class="slider-value" id="strokeValue">3px</span>
                        </div>
                        <div class="dropdown-label" style="margin-top: 16px;">Opacity</div>
                        <div class="slider-row">
                            <input type="range" class="slider" id="opacitySlider" min="10" max="100" value="100">
                            <span class="slider-value" id="opacityValue">100%</span>
                        </div>
                    </div>
                </div>

                <!-- Background -->
                <div class="submenu-wrapper">
                    <button class="tool-btn" id="bgBtn" title="Background">
                        <i class="fas fa-fill-drip"></i>
                    </button>
                    <div class="bg-dropdown" id="bgDropdown">
                        <div class="dropdown-label">Background Color</div>
                        <div class="bg-colors" id="bgColors"></div>
                        <div class="dropdown-label">Pattern</div>
                        <div class="pattern-grid" id="patternGrid"></div>
                    </div>
                </div>

                <div class="toolbar-divider"></div>

                <button class="tool-btn" id="clearBtn" title="Clear All">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>

            <!-- Zoom -->
            <div class="zoom-controls">
                <button class="zoom-btn" id="zoomOut">
                    <i class="fas fa-minus"></i>
                </button>
                <span class="zoom-value" id="zoomValue">100%</span>
                <button class="zoom-btn" id="zoomIn">
                    <i class="fas fa-plus"></i>
                </button>
                <button class="zoom-btn" id="zoomReset" title="Reset">
                    <i class="fas fa-compress-arrows-alt"></i>
                </button>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Hidden inputs -->
    <input type="file" id="imageInput" accept="image/*" style="display: none;">
    <input type="file" id="jsonInput" accept=".json" style="display: none;">

    <script>
    (function() {
        'use strict';

        // ============ STATE ============
        const state = {
            tool: 'select',
            color: '#6366f1',
            strokeWidth: 3,
            opacity: 100,
            bgColor: '#ffffff',
            bgPattern: 'none',
            zoom: 1,
            isDrawingShape: false,  // IMPORTANT: renamed for clarity
            startX: 0,
            startY: 0,
            tempObj: null,
            isPanning: false,
            panX: 0,
            panY: 0,
            history: [],
            historyIdx: -1,
            clipboard: null
        };

        // List of shape tools that need mouse drag to create
        const SHAPE_TOOLS = [
            'line', 'arrow', 'rect', 'circle', 'triangle', 'star', 'path',
            'trendline', 'hline', 'vline', 'ray', 'channel', 'fib', 'fibext',
            'gann', 'pitchfork', 'elliott', 'headshoulders', 'measure'
        ];

        // ============ COLORS ============
        const colors = [
            '#1e293b', '#475569', '#94a3b8', '#e2e8f0', '#ffffff', '#000000',
            '#ef4444', '#f97316', '#f59e0b', '#eab308', '#84cc16', '#22c55e',
            '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6', '#6366f1',
            '#8b5cf6', '#a855f7', '#d946ef', '#ec4899', '#f43f5e', '#fef3c7'
        ];

        const bgColors = [
            '#ffffff', '#f9fafb', '#f3f4f6', '#e5e7eb', '#1f2937', '#111827',
            '#fef3c7', '#dcfce7', '#dbeafe', '#ede9fe', '#fce7f3', '#fee2e2'
        ];

        const patterns = [
            { id: 'none', name: 'None' },
            { id: 'grid', name: 'Grid' },
            { id: 'dots', name: 'Dots' },
            { id: 'lines', name: 'Lines' },
            { id: 'cross', name: 'Cross' },
            { id: 'iso', name: 'Isometric' }
        ];

        // ============ CANVAS SETUP ============
        const container = document.getElementById('canvasContainer');
        const canvasEl = document.getElementById('canvas');

        canvasEl.width = container.clientWidth;
        canvasEl.height = container.clientHeight;

        const canvas = new fabric.Canvas('canvas', {
            isDrawingMode: false,
            selection: true,
            backgroundColor: '#ffffff',
            preserveObjectStacking: true
        });

        // Resize
        window.addEventListener('resize', () => {
            canvas.setWidth(container.clientWidth);
            canvas.setHeight(container.clientHeight);
            canvas.renderAll();
        });

        // ============ HELPERS ============
        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function showCurrentTool(name) {
            const el = document.getElementById('currentTool');
            el.textContent = name;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 1500);
        }

        function saveHistory() {
            if (state.historyIdx < state.history.length - 1) {
                state.history = state.history.slice(0, state.historyIdx + 1);
            }
            state.history.push(JSON.stringify(canvas.toJSON()));
            if (state.history.length > 30) state.history.shift();
            else state.historyIdx++;
        }

        function undo() {
            if (state.historyIdx > 0) {
                state.historyIdx--;
                canvas.loadFromJSON(state.history[state.historyIdx], () => canvas.renderAll());
                showToast('Undo', 'info');
            }
        }

        function redo() {
            if (state.historyIdx < state.history.length - 1) {
                state.historyIdx++;
                canvas.loadFromJSON(state.history[state.historyIdx], () => canvas.renderAll());
                showToast('Redo', 'info');
            }
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.color-dropdown, .stroke-dropdown, .bg-dropdown, .submenu, .file-dropdown')
                .forEach(d => d.classList.remove('show'));
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        // ============ SET TOOL ============
        function setTool(tool) {
            state.tool = tool;
            
            // Update UI
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll(`[data-tool="${tool}"]`).forEach(b => b.classList.add('active'));

            closeAllDropdowns();
            showCurrentTool(tool.charAt(0).toUpperCase() + tool.slice(1));

            // Reset canvas state
            canvas.isDrawingMode = false;
            canvas.selection = false;
            canvas.defaultCursor = 'default';
            
            // Make all objects non-selectable by default
            canvas.forEachObject(o => { 
                o.selectable = false; 
                o.evented = false; 
            });

            // Configure based on tool
            if (tool === 'select') {
                canvas.selection = true;
                canvas.forEachObject(o => { 
                    o.selectable = true; 
                    o.evented = true; 
                });
            } else if (tool === 'pan') {
                canvas.defaultCursor = 'grab';
            } else if (['pencil', 'brush', 'highlighter'].includes(tool)) {
                canvas.isDrawingMode = true;
                updateBrush();
            } else if (tool === 'eraser') {
                canvas.isDrawingMode = true;
                canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
                canvas.freeDrawingBrush.color = state.bgColor;
                canvas.freeDrawingBrush.width = state.strokeWidth * 3;
            } else if (tool === 'text' || tool === 'sticky') {
                canvas.defaultCursor = 'crosshair';
            } else if (tool === 'image') {
                document.getElementById('imageInput').click();
                setTimeout(() => setTool('select'), 100);
            } else if (SHAPE_TOOLS.includes(tool)) {
                canvas.defaultCursor = 'crosshair';
            }

            canvas.renderAll();
        }

        function updateBrush() {
            let width = state.strokeWidth;
            let opacity = state.opacity / 100;

            if (state.tool === 'highlighter') {
                width = state.strokeWidth * 3;
                opacity = 0.4;
            } else if (state.tool === 'brush') {
                width = state.strokeWidth * 1.5;
            }

            canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
            canvas.freeDrawingBrush.color = hexToRgba(state.color, opacity);
            canvas.freeDrawingBrush.width = width;
        }

        // ============ INIT UI ============
        function initColorGrid() {
            const grid = document.getElementById('colorGrid');
            colors.forEach(c => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch' + (c === state.color ? ' active' : '');
                swatch.style.background = c;
                if (c === '#ffffff') swatch.style.border = '1px solid #e5e7eb';
                swatch.onclick = () => {
                    state.color = c;
                    document.getElementById('colorBtn').style.background = c;
                    document.getElementById('customColor').value = c;
                    document.querySelectorAll('#colorGrid .color-swatch').forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                    if (canvas.isDrawingMode) updateBrush();
                };
                grid.appendChild(swatch);
            });
        }

        function initBgColors() {
            const grid = document.getElementById('bgColors');
            bgColors.forEach(c => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch' + (c === state.bgColor ? ' active' : '');
                swatch.style.background = c;
                if (c === '#ffffff') swatch.style.border = '1px solid #e5e7eb';
                swatch.onclick = () => {
                    state.bgColor = c;
                    document.querySelectorAll('#bgColors .color-swatch').forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                    updateBackground();
                };
                grid.appendChild(swatch);
            });
        }

        function initPatterns() {
            const grid = document.getElementById('patternGrid');
            patterns.forEach(p => {
                const item = document.createElement('div');
                item.className = 'pattern-item' + (p.id === state.bgPattern ? ' active' : '');
                item.style.background = getPatternStyle(p.id);
                item.style.backgroundSize = '20px 20px';
                item.onclick = () => {
                    state.bgPattern = p.id;
                    document.querySelectorAll('.pattern-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    updateBackground();
                };
                grid.appendChild(item);
            });
        }

        function getPatternStyle(id) {
            switch(id) {
                case 'none': return '#fff';
                case 'grid': return 'linear-gradient(#e5e7eb 1px, transparent 1px), linear-gradient(90deg, #e5e7eb 1px, transparent 1px), #fff';
                case 'dots': return 'radial-gradient(circle, #d1d5db 1.5px, #fff 1.5px)';
                case 'lines': return 'linear-gradient(#e5e7eb 1px, transparent 1px), #fff';
                case 'cross': return 'linear-gradient(#e5e7eb 1px, transparent 1px), linear-gradient(90deg, #e5e7eb 1px, transparent 1px), #fff';
                case 'iso': return 'linear-gradient(30deg, #e5e7eb 12%, transparent 12.5%, transparent 87%, #e5e7eb 87.5%), linear-gradient(150deg, #e5e7eb 12%, transparent 12.5%, transparent 87%, #e5e7eb 87.5%), linear-gradient(30deg, #e5e7eb 12%, transparent 12.5%, transparent 87%, #e5e7eb 87.5%), linear-gradient(150deg, #e5e7eb 12%, transparent 12.5%, transparent 87%, #e5e7eb 87.5%), #fff';
                default: return '#fff';
            }
        }

        function updateBackground() {
            if (state.bgPattern === 'none') {
                canvas.setBackgroundColor(state.bgColor, canvas.renderAll.bind(canvas));
            } else {
                const patternCanvas = document.createElement('canvas');
                const ctx = patternCanvas.getContext('2d');
                const size = 20;
                patternCanvas.width = size;
                patternCanvas.height = size;

                ctx.fillStyle = state.bgColor;
                ctx.fillRect(0, 0, size, size);

                ctx.strokeStyle = '#d1d5db';
                ctx.fillStyle = '#d1d5db';
                ctx.lineWidth = 1;

                switch(state.bgPattern) {
                    case 'grid':
                        ctx.beginPath();
                        ctx.moveTo(size, 0);
                        ctx.lineTo(size, size);
                        ctx.lineTo(0, size);
                        ctx.stroke();
                        break;
                    case 'dots':
                        ctx.beginPath();
                        ctx.arc(size/2, size/2, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    case 'lines':
                        ctx.beginPath();
                        ctx.moveTo(0, size - 0.5);
                        ctx.lineTo(size, size - 0.5);
                        ctx.stroke();
                        break;
                    case 'cross':
                        ctx.beginPath();
                        ctx.moveTo(size, 0);
                        ctx.lineTo(size, size);
                        ctx.moveTo(0, size);
                        ctx.lineTo(size, size);
                        ctx.stroke();
                        break;
                    case 'iso':
                        ctx.beginPath();
                        ctx.moveTo(0, size);
                        ctx.lineTo(size/2, 0);
                        ctx.lineTo(size, size);
                        ctx.stroke();
                        break;
                }

                const pattern = new fabric.Pattern({
                    source: patternCanvas,
                    repeat: 'repeat'
                });
                canvas.setBackgroundColor(pattern, canvas.renderAll.bind(canvas));
            }
        }

        // ============ TOOL BUTTONS ============
        document.querySelectorAll('[data-tool]').forEach(btn => {
            btn.addEventListener('click', () => setTool(btn.dataset.tool));
        });

        // ============ DROPDOWNS ============
        document.getElementById('colorBtn').onclick = (e) => {
            e.stopPropagation();
            closeAllDropdowns();
            document.getElementById('colorDropdown').classList.toggle('show');
        };

        document.getElementById('strokeBtn').onclick = (e) => {
            e.stopPropagation();
            closeAllDropdowns();
            document.getElementById('strokeDropdown').classList.toggle('show');
        };

        document.getElementById('bgBtn').onclick = (e) => {
            e.stopPropagation();
            closeAllDropdowns();
            document.getElementById('bgDropdown').classList.toggle('show');
        };

        document.getElementById('tradingBtn').onclick = (e) => {
            e.stopPropagation();
            closeAllDropdowns();
            document.getElementById('tradingSubmenu').classList.toggle('show');
        };

        document.getElementById('fileBtn').onclick = (e) => {
            e.stopPropagation();
            closeAllDropdowns();
            document.getElementById('fileDropdown').classList.toggle('show');
        };

        document.addEventListener('click', closeAllDropdowns);

        // Prevent dropdowns from closing when clicking inside
        document.querySelectorAll('.color-dropdown, .stroke-dropdown, .bg-dropdown, .submenu, .file-dropdown').forEach(el => {
            el.addEventListener('click', e => e.stopPropagation());
        });

        // Custom color
        document.getElementById('customColor').onchange = (e) => {
            state.color = e.target.value;
            document.getElementById('colorBtn').style.background = state.color;
            document.querySelectorAll('#colorGrid .color-swatch').forEach(s => s.classList.remove('active'));
            if (canvas.isDrawingMode) updateBrush();
        };

        // Sliders
        document.getElementById('strokeSlider').oninput = (e) => {
            state.strokeWidth = parseInt(e.target.value);
            document.getElementById('strokeValue').textContent = state.strokeWidth + 'px';
            if (canvas.isDrawingMode) updateBrush();
        };

        document.getElementById('opacitySlider').oninput = (e) => {
            state.opacity = parseInt(e.target.value);
            document.getElementById('opacityValue').textContent = state.opacity + '%';
            if (canvas.isDrawingMode) updateBrush();
        };

        // ============ CANVAS EVENTS ============
        
        // FIXED: Only start shape drawing if clicking on empty canvas area
        canvas.on('mouse:down', function(opt) {
            const e = opt.e;
            const pointer = canvas.getPointer(e);
            
            // Check if we clicked on an existing object
            const target = canvas.findTarget(e, false);

            // Pan tool
            if (state.tool === 'pan') {
                state.isPanning = true;
                state.panX = e.clientX;
                state.panY = e.clientY;
                canvas.defaultCursor = 'grabbing';
                return;
            }

            // If select tool and clicked on object, let fabric handle it
            if (state.tool === 'select') {
                return; // Fabric.js handles selection automatically
            }

            // Text tool - only if not clicking on existing object
            if (state.tool === 'text' && !target) {
                const text = new fabric.IText('Text', {
                    left: pointer.x,
                    top: pointer.y,
                    fontFamily: 'Inter',
                    fontSize: 24,
                    fill: state.color
                });
                canvas.add(text);
                canvas.setActiveObject(text);
                text.enterEditing();
                saveHistory();
                setTool('select');
                return;
            }

            // Sticky note - only if not clicking on existing object
            if (state.tool === 'sticky' && !target) {
                const stickyColors = ['#fef3c7', '#dbeafe', '#dcfce7', '#fce7f3', '#ede9fe'];
                const color = stickyColors[Math.floor(Math.random() * stickyColors.length)];

                const rect = new fabric.Rect({
                    width: 180,
                    height: 140,
                    fill: color,
                    rx: 6,
                    ry: 6,
                    shadow: new fabric.Shadow({ color: 'rgba(0,0,0,0.1)', blur: 8, offsetX: 2, offsetY: 2 })
                });

                const textObj = new fabric.IText('Note', {
                    left: 12,
                    top: 12,
                    fontSize: 14,
                    fontFamily: 'Inter',
                    fill: '#374151'
                });

                const group = new fabric.Group([rect, textObj], {
                    left: pointer.x - 90,
                    top: pointer.y - 70
                });

                canvas.add(group);
                canvas.setActiveObject(group);
                saveHistory();
                showToast('Sticky note added', 'success');
                setTool('select');
                return;
            }

            // Shape tools - ONLY start drawing if not clicking on existing object
            if (SHAPE_TOOLS.includes(state.tool) && !target) {
                state.isDrawingShape = true;
                state.startX = pointer.x;
                state.startY = pointer.y;
            }
        });

        canvas.on('mouse:move', function(opt) {
            const e = opt.e;

            // Pan
            if (state.isPanning && state.tool === 'pan') {
                const dx = e.clientX - state.panX;
                const dy = e.clientY - state.panY;
                canvas.relativePan(new fabric.Point(dx, dy));
                state.panX = e.clientX;
                state.panY = e.clientY;
                return;
            }

            // Shape drawing
            if (!state.isDrawingShape) return;

            const pointer = canvas.getPointer(e);

            if (state.tempObj) {
                canvas.remove(state.tempObj);
                state.tempObj = null;
            }

            state.tempObj = createShape(state.startX, state.startY, pointer.x, pointer.y);
            if (state.tempObj) {
                canvas.add(state.tempObj);
            }
        });

        canvas.on('mouse:up', function() {
            // Pan
            if (state.isPanning) {
                state.isPanning = false;
                canvas.defaultCursor = 'grab';
                return;
            }

            // Shape drawing complete
            if (state.isDrawingShape && state.tempObj) {
                // Make the shape selectable
                state.tempObj.set({ 
                    selectable: true, 
                    evented: true 
                });
                canvas.setActiveObject(state.tempObj);
                saveHistory();
                
                // Switch to select tool after drawing
                setTool('select');
            }

            state.isDrawingShape = false;
            state.tempObj = null;
        });

        canvas.on('object:modified', saveHistory);
        canvas.on('path:created', saveHistory);

        // ============ CREATE SHAPES ============
        function createShape(x1, y1, x2, y2) {
            const props = {
                stroke: state.color,
                strokeWidth: state.strokeWidth,
                fill: 'transparent',
                opacity: state.opacity / 100,
                selectable: false,
                evented: false
            };

            const w = x2 - x1;
            const h = y2 - y1;

            switch(state.tool) {
                case 'line':
                case 'trendline':
                    return new fabric.Line([x1, y1, x2, y2], props);

                case 'hline':
                    return new fabric.Line([0, y1, canvas.width, y1], { ...props, stroke: '#ef4444' });

                case 'vline':
                    return new fabric.Line([x1, 0, x1, canvas.height], { ...props, stroke: '#3b82f6' });

                case 'ray': {
                    const angle = Math.atan2(y2 - y1, x2 - x1);
                    return new fabric.Line([x1, y1, x1 + 2000 * Math.cos(angle), y1 + 2000 * Math.sin(angle)], props);
                }

                case 'arrow':
                    return createArrow(x1, y1, x2, y2, props);

                case 'rect':
                    return new fabric.Rect({
                        left: Math.min(x1, x2),
                        top: Math.min(y1, y2),
                        width: Math.abs(w),
                        height: Math.abs(h),
                        ...props
                    });

                case 'circle': {
                    const r = Math.sqrt(w * w + h * h) / 2;
                    return new fabric.Circle({
                        left: (x1 + x2) / 2 - r,
                        top: (y1 + y2) / 2 - r,
                        radius: r,
                        ...props
                    });
                }

                case 'triangle':
                    return new fabric.Triangle({
                        left: Math.min(x1, x2),
                        top: Math.min(y1, y2),
                        width: Math.abs(w),
                        height: Math.abs(h),
                        ...props
                    });

                case 'star':
                    return createStar(x1, y1, x2, y2, props);

                case 'path': {
                    const mx = (x1 + x2) / 2;
                    const my = Math.min(y1, y2) - 40;
                    return new fabric.Path(`M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`, { ...props, fill: 'transparent' });
                }

                case 'channel':
                    return createChannel(x1, y1, x2, y2, props);

                case 'fib':
                    return createFib(x1, y1, x2, y2);

                case 'fibext':
                    return createFibExt(x1, y1, x2, y2);

                case 'gann':
                    return createGann(x1, y1, x2, y2);

                case 'pitchfork':
                    return createPitchfork(x1, y1, x2, y2);

                case 'elliott':
                    return createElliott(x1, y1, x2, y2);

                case 'headshoulders':
                    return createHS(x1, y1, x2, y2);

                case 'measure':
                    return createMeasure(x1, y1, x2, y2);

                default:
                    return null;
            }
        }

        function createArrow(x1, y1, x2, y2, props) {
            const angle = Math.atan2(y2 - y1, x2 - x1);
            const headLen = 12;

            const line = new fabric.Line([x1, y1, x2, y2], props);
            const head = new fabric.Triangle({
                left: x2,
                top: y2,
                width: headLen,
                height: headLen,
                fill: props.stroke,
                angle: (angle * 180 / Math.PI) + 90,
                originX: 'center',
                originY: 'center',
                selectable: false,
                evented: false
            });

            return new fabric.Group([line, head], { selectable: false, evented: false });
        }

        function createStar(x1, y1, x2, y2, props) {
            const cx = (x1 + x2) / 2;
            const cy = (y1 + y2) / 2;
            const outer = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2)) / 2;
            const inner = outer * 0.4;
            const pts = [];

            for (let i = 0; i < 10; i++) {
                const r = i % 2 === 0 ? outer : inner;
                const a = (Math.PI / 5) * i - Math.PI / 2;
                pts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
            }

            return new fabric.Polygon(pts, props);
        }

        function createChannel(x1, y1, x2, y2, props) {
            const h = Math.abs(y2 - y1);
            const mid = h / 2;

            return new fabric.Group([
                new fabric.Line([x1, y1, x2, y1], { ...props, stroke: '#22c55e' }),
                new fabric.Line([x1, y1 + mid, x2, y1 + mid], { ...props, stroke: '#eab308', strokeDashArray: [5, 5] }),
                new fabric.Line([x1, y2, x2, y2], { ...props, stroke: '#ef4444' })
            ], { selectable: false, evented: false });
        }

        function createFib(x1, y1, x2, y2) {
            const levels = [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1];
            const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#3b82f6', '#8b5cf6'];
            const h = y2 - y1;
            const objs = [];

            levels.forEach((lv, i) => {
                const y = y1 + h * lv;
                objs.push(new fabric.Line([x1, y, x2, y], { stroke: colors[i], strokeWidth: 1, selectable: false, evented: false }));
                objs.push(new fabric.Text((lv * 100).toFixed(1) + '%', {
                    left: x2 + 4, top: y - 7, fontSize: 10, fill: colors[i], fontFamily: 'Inter', selectable: false, evented: false
                }));
            });

            return new fabric.Group(objs, { selectable: false, evented: false });
        }

        function createFibExt(x1, y1, x2, y2) {
            const levels = [0, 0.618, 1, 1.272, 1.618, 2, 2.618];
            const colors = ['#6366f1', '#8b5cf6', '#a855f7', '#d946ef', '#ec4899', '#f43f5e', '#ef4444'];
            const h = y2 - y1;
            const objs = [];

            levels.forEach((lv, i) => {
                const y = y1 + h * lv;
                objs.push(new fabric.Line([x1, y, x2, y], {
                    stroke: colors[i], strokeWidth: 1, strokeDashArray: lv > 1 ? [5, 3] : null, selectable: false, evented: false
                }));
                objs.push(new fabric.Text((lv * 100).toFixed(1) + '%', {
                    left: x2 + 4, top: y - 7, fontSize: 10, fill: colors[i], fontFamily: 'Inter', selectable: false, evented: false
                }));
            });

            return new fabric.Group(objs, { selectable: false, evented: false });
        }

        function createGann(x1, y1, x2, y2) {
            const w = x2 - x1, h = y2 - y1;
            const objs = [];

            objs.push(new fabric.Rect({ left: x1, top: y1, width: w, height: h, fill: 'transparent', stroke: '#6366f1', strokeWidth: 2, selectable: false, evented: false }));

            [0.25, 0.5, 0.75].forEach(d => {
                objs.push(new fabric.Line([x1 + w * d, y1, x1 + w * d, y2], { stroke: '#9ca3af', strokeWidth: 1, strokeDashArray: [3, 3], selectable: false, evented: false }));
                objs.push(new fabric.Line([x1, y1 + h * d, x2, y1 + h * d], { stroke: '#9ca3af', strokeWidth: 1, strokeDashArray: [3, 3], selectable: false, evented: false }));
            });

            objs.push(new fabric.Line([x1, y1, x2, y2], { stroke: '#ef4444', strokeWidth: 1, selectable: false, evented: false }));
            objs.push(new fabric.Line([x1, y2, x2, y1], { stroke: '#22c55e', strokeWidth: 1, selectable: false, evented: false }));

            return new fabric.Group(objs, { selectable: false, evented: false });
        }

        function createPitchfork(x1, y1, x2, y2) {
            const angle = Math.atan2(y2 - y1, x2 - x1);
            const len = 400;
            const offset = 40;
            const perp = angle + Math.PI / 2;
            const objs = [];

            objs.push(new fabric.Line([x1, y1, x1 + len * Math.cos(angle), y1 + len * Math.sin(angle)], { stroke: '#6366f1', strokeWidth: 2, selectable: false, evented: false }));
            objs.push(new fabric.Line([x1 + offset * Math.cos(perp), y1 + offset * Math.sin(perp), x1 + len * Math.cos(angle) + offset * Math.cos(perp), y1 + len * Math.sin(angle) + offset * Math.sin(perp)], { stroke: '#22c55e', strokeWidth: 1, strokeDashArray: [5, 3], selectable: false, evented: false }));
            objs.push(new fabric.Line([x1 - offset * Math.cos(perp), y1 - offset * Math.sin(perp), x1 + len * Math.cos(angle) - offset * Math.cos(perp), y1 + len * Math.sin(angle) - offset * Math.sin(perp)], { stroke: '#ef4444', strokeWidth: 1, strokeDashArray: [5, 3], selectable: false, evented: false }));
            objs.push(new fabric.Circle({ left: x1 - 5, top: y1 - 5, radius: 5, fill: '#6366f1', selectable: false, evented: false }));

            return new fabric.Group(objs, { selectable: false, evented: false });
        }

        function createElliott(x1, y1, x2, y2) {
            const w = x2 - x1, h = y2 - y1;
            const pts = [
                { x: x1, y: y1 + h * 0.7, l: '0' },
                { x: x1 + w * 0.12, y: y1 + h * 0.3, l: '1' },
                { x: x1 + w * 0.22, y: y1 + h * 0.5, l: '2' },
                { x: x1 + w * 0.42, y: y1, l: '3' },
                { x: x1 + w * 0.52, y: y1 + h * 0.3, l: '4' },
                { x: x1 + w * 0.65, y: y1 + h * 0.1, l: '5' },
                { x: x1 + w * 0.78, y: y1 + h * 0.5, l: 'A' },
                { x: x1 + w * 0.88, y: y1 + h * 0.3, l: 'B' },
                { x: x2, y: y2, l: 'C' }
            ];
            const objs = [];

            for (let i = 0; i < pts.length - 1; i++) {
                objs.push(new fabric.Line([pts[i].x, pts[i].y, pts[i + 1].x, pts[i + 1].y], { stroke: i < 5 ? '#22c55e' : '#ef4444', strokeWidth: 2, selectable: false, evented: false }));
            }

            pts.forEach(p => {
                objs.push(new fabric.Circle({ left: p.x - 9, top: p.y - 9, radius: 9, fill: '#fff', stroke: '#6366f1', strokeWidth: 2, selectable: false, evented: false }));
                objs.push(new fabric.Text(p.l, { left: p.x - 4, top: p.y - 6, fontSize: 10, fill: '#6366f1', fontFamily: 'Inter', fontWeight: 'bold', selectable: false, evented: false }));
            });

            return new fabric.Group(objs, { selectable: false, evented: false });
        }

        function createHS(x1, y1, x2, y2) {
            const w = x2 - x1, h = y2 - y1;
            const pts = [
                [x1, y2], [x1 + w * 0.15, y1 + h * 0.4], [x1 + w * 0.25, y1 + h * 0.6],
                [x1 + w * 0.4, y1 + h * 0.15], [x1 + w * 0.5, y1], [x1 + w * 0.6, y1 + h * 0.15],
                [x1 + w * 0.75, y1 + h * 0.6], [x1 + w * 0.85, y1 + h * 0.4], [x2, y2]
            ];
            const objs = [];

            const pathStr = pts.map((p, i) => (i === 0 ? 'M' : 'L') + ' ' + p[0] + ' ' + p[1]).join(' ');
            objs.push(new fabric.Path(pathStr, { stroke: '#6366f1', strokeWidth: 2, fill: 'transparent', selectable: false, evented: false }));
            objs.push(new fabric.Line([x1 + w * 0.25, y1 + h * 0.6, x1 + w * 0.75, y1 + h * 0.6], { stroke: '#ef4444', strokeWidth: 2, strokeDashArray: [6, 4], selectable: false, evented: false }));

            [{ x: x1 + w * 0.15, y: y1 + h * 0.28, t: 'LS' }, { x: x1 + w * 0.5, y: y1 - 12, t: 'H' }, { x: x1 + w * 0.85, y: y1 + h * 0.28, t: 'RS' }].forEach(lb => {
                objs.push(new fabric.Text(lb.t, { left: lb.x - 8, top: lb.y, fontSize: 11, fill: '#6366f1', fontFamily: 'Inter', fontWeight: 'bold', selectable: false, evented: false }));
            });

            return new fabric.Group(objs, { selectable: false, evented: false });
        }

        function createMeasure(x1, y1, x2, y2) {
            const dist = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
            const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
            const objs = [];

            objs.push(new fabric.Line([x1, y1, x2, y2], { stroke: '#6366f1', strokeWidth: 2, selectable: false, evented: false }));
            objs.push(new fabric.Circle({ left: x1 - 4, top: y1 - 4, radius: 4, fill: '#6366f1', selectable: false, evented: false }));
            objs.push(new fabric.Circle({ left: x2 - 4, top: y2 - 4, radius: 4, fill: '#6366f1', selectable: false, evented: false }));
            objs.push(new fabric.Rect({ left: mx - 30, top: my - 10, width: 60, height: 20, fill: '#6366f1', rx: 4, ry: 4, selectable: false, evented: false }));
            objs.push(new fabric.Text(dist.toFixed(0) + 'px', { left: mx - 22, top: my - 6, fontSize: 11, fill: '#fff', fontFamily: 'Inter', fontWeight: 'bold', selectable: false, evented: false }));

            return new fabric.Group(objs, { selectable: false, evented: false });
        }

        // ============ IMAGE UPLOAD ============
        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    fabric.Image.fromURL(ev.target.result, (img) => {
                        const max = 350;
                        if (img.width > max || img.height > max) {
                            img.scale(max / Math.max(img.width, img.height));
                        }
                        img.set({
                            left: canvas.width / 2 - (img.width * img.scaleX) / 2,
                            top: canvas.height / 2 - (img.height * img.scaleY) / 2
                        });
                        canvas.add(img);
                        canvas.setActiveObject(img);
                        saveHistory();
                        showToast('Image added', 'success');
                        setTool('select');
                    });
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        });

        // ============ ZOOM ============
        document.getElementById('zoomIn').onclick = () => {
            if (state.zoom < 4) {
                state.zoom = Math.min(4, state.zoom * 1.2);
                canvas.setZoom(state.zoom);
                document.getElementById('zoomValue').textContent = Math.round(state.zoom * 100) + '%';
            }
        };

        document.getElementById('zoomOut').onclick = () => {
            if (state.zoom > 0.2) {
                state.zoom = Math.max(0.2, state.zoom / 1.2);
                canvas.setZoom(state.zoom);
                document.getElementById('zoomValue').textContent = Math.round(state.zoom * 100) + '%';
            }
        };

        document.getElementById('zoomReset').onclick = () => {
            state.zoom = 1;
            canvas.setZoom(1);
            canvas.setViewportTransform([1, 0, 0, 1, 0, 0]);
            document.getElementById('zoomValue').textContent = '100%';
        };

        container.addEventListener('wheel', (e) => {
            if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                state.zoom = Math.max(0.2, Math.min(4, state.zoom + delta));
                canvas.setZoom(state.zoom);
                document.getElementById('zoomValue').textContent = Math.round(state.zoom * 100) + '%';
            }
        }, { passive: false });

        // ============ HISTORY ============
        document.getElementById('undoBtn').onclick = undo;
        document.getElementById('redoBtn').onclick = redo;

        // ============ CLEAR ============
        document.getElementById('clearBtn').onclick = () => {
            Swal.fire({
                title: 'Clear Canvas?',
                text: 'All objects will be removed.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Clear'
            }).then((res) => {
                if (res.isConfirmed) {
                    canvas.clear();
                    updateBackground();
                    saveHistory();
                    showToast('Canvas cleared', 'warning');
                }
            });
        };

        // ============ FILE OPS ============
        document.getElementById('newBtn').onclick = () => {
            Swal.fire({
                title: 'New Board?',
                text: 'Unsaved changes will be lost.',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#6366f1',
                confirmButtonText: 'Create'
            }).then((res) => {
                if (res.isConfirmed) {
                    canvas.clear();
                    state.bgColor = '#ffffff';
                    state.bgPattern = 'none';
                    updateBackground();
                    state.history = [];
                    state.historyIdx = -1;
                    saveHistory();
                    showToast('New board', 'success');
                }
            });
            closeAllDropdowns();
        };

        document.getElementById('saveBtn').onclick = () => {
            localStorage.setItem('infinityboard', JSON.stringify({
                canvas: canvas.toJSON(),
                bgColor: state.bgColor,
                bgPattern: state.bgPattern
            }));
            showToast('Saved!', 'success');
            closeAllDropdowns();
        };

        document.getElementById('loadBtn').onclick = () => {
            document.getElementById('jsonInput').click();
            closeAllDropdowns();
        };

        document.getElementById('jsonInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        canvas.loadFromJSON(data.canvas || data, () => {
                            canvas.renderAll();
                            if (data.bgColor) state.bgColor = data.bgColor;
                            if (data.bgPattern) state.bgPattern = data.bgPattern;
                            updateBackground();
                            saveHistory();
                            showToast('Loaded!', 'success');
                            setTool('select');
                        });
                    } catch {
                        showToast('Error loading', 'error');
                    }
                };
                reader.readAsText(file);
            }
            e.target.value = '';
        };

        document.getElementById('exportPng').onclick = () => {
            const url = canvas.toDataURL({ format: 'png', quality: 1, multiplier: 2 });
            const a = document.createElement('a');
            a.href = url;
            a.download = 'infinityboard.png';
            a.click();
            showToast('PNG exported', 'success');
            closeAllDropdowns();
        };

        document.getElementById('exportPdf').onclick = () => {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('l', 'px', [canvas.width, canvas.height]);
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.width, canvas.height);
            pdf.save('infinityboard.pdf');
            showToast('PDF exported', 'success');
            closeAllDropdowns();
        };

        document.getElementById('exportJson').onclick = () => {
            const data = JSON.stringify({
                canvas: canvas.toJSON(),
                bgColor: state.bgColor,
                bgPattern: state.bgPattern
            }, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            saveAs(blob, 'infinityboard.json');
            showToast('JSON exported', 'success');
            closeAllDropdowns();
        };

        document.getElementById('shareBtn').onclick = () => {
            const url = window.location.href + '?id=' + Date.now().toString(36);
            Swal.fire({
                title: 'Share Board',
                html: `<input type="text" value="${url}" id="shareUrl" readonly style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px;font-size:13px;">`,
                confirmButtonText: 'Copy Link',
                confirmButtonColor: '#6366f1',
                showCancelButton: true
            }).then((res) => {
                if (res.isConfirmed) {
                    navigator.clipboard.writeText(url);
                    showToast('Link copied!', 'success');
                }
            });
        };

        // ============ KEYBOARD SHORTCUTS ============
        document.addEventListener('keydown', (e) => {
            // Ignore if typing in input or text editing
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.isEditing) return;

            const key = e.key.toLowerCase();
            const ctrl = e.ctrlKey || e.metaKey;

            if (ctrl && key === 'z') {
                e.preventDefault();
                if (e.shiftKey) redo();
                else undo();
            } else if (ctrl && key === 'y') {
                e.preventDefault();
                redo();
            } else if (ctrl && key === 's') {
                e.preventDefault();
                localStorage.setItem('infinityboard', JSON.stringify({
                    canvas: canvas.toJSON(),
                    bgColor: state.bgColor,
                    bgPattern: state.bgPattern
                }));
                showToast('Saved!', 'success');
            } else if (ctrl && key === 'a') {
                e.preventDefault();
                canvas.discardActiveObject();
                const sel = new fabric.ActiveSelection(canvas.getObjects(), { canvas });
                canvas.setActiveObject(sel);
                canvas.renderAll();
            } else if (ctrl && key === 'c') {
                e.preventDefault();
                const obj = canvas.getActiveObject();
                if (obj) {
                    obj.clone((cloned) => { state.clipboard = cloned; });
                    showToast('Copied', 'info');
                }
            } else if (ctrl && key === 'v') {
                e.preventDefault();
                if (state.clipboard) {
                    state.clipboard.clone((cloned) => {
                        cloned.set({ left: cloned.left + 15, top: cloned.top + 15, evented: true, selectable: true });
                        if (cloned.type === 'activeSelection') {
                            cloned.canvas = canvas;
                            cloned.forEachObject((o) => {
                                o.selectable = true;
                                o.evented = true;
                                canvas.add(o);
                            });
                            cloned.setCoords();
                        } else {
                            canvas.add(cloned);
                        }
                        canvas.setActiveObject(cloned);
                        canvas.renderAll();
                        saveHistory();
                    });
                    showToast('Pasted', 'info');
                }
            } else if (ctrl && key === 'd') {
                e.preventDefault();
                const obj = canvas.getActiveObject();
                if (obj) {
                    obj.clone((cloned) => {
                        cloned.set({ left: cloned.left + 15, top: cloned.top + 15, evented: true, selectable: true });
                        canvas.add(cloned);
                        canvas.setActiveObject(cloned);
                        canvas.renderAll();
                        saveHistory();
                    });
                    showToast('Duplicated', 'info');
                }
            } else if (key === 'delete' || key === 'backspace') {
                e.preventDefault();
                const objs = canvas.getActiveObjects();
                if (objs.length) {
                    objs.forEach((o) => canvas.remove(o));
                    canvas.discardActiveObject();
                    canvas.renderAll();
                    saveHistory();
                    showToast('Deleted', 'warning');
                }
            } else if (key === 'escape') {
                closeAllDropdowns();
                canvas.discardActiveObject();
                canvas.renderAll();
                setTool('select');
            } else if (!ctrl) {
                // Tool shortcuts (only when ctrl is not pressed)
                switch(key) {
                    case 'v': setTool('select'); break;
                    case 'h': setTool('pan'); break;
                    case 'p': setTool('pencil'); break;
                    case 'b': setTool('brush'); break;
                    case 'e': setTool('eraser'); break;
                    case 't': setTool('text'); break;
                    case 'l': setTool('line'); break;
                    case 'r': setTool('rect'); break;
                    case 'c': setTool('circle'); break;
                    case 'a': setTool('arrow'); break;
                    case '[': 
                        state.strokeWidth = Math.max(1, state.strokeWidth - 1);
                        document.getElementById('strokeSlider').value = state.strokeWidth;
                        document.getElementById('strokeValue').textContent = state.strokeWidth + 'px';
                        if (canvas.isDrawingMode) updateBrush();
                        showToast('Stroke: ' + state.strokeWidth + 'px', 'info');
                        break;
                    case ']':
                        state.strokeWidth = Math.min(50, state.strokeWidth + 1);
                        document.getElementById('strokeSlider').value = state.strokeWidth;
                        document.getElementById('strokeValue').textContent = state.strokeWidth + 'px';
                        if (canvas.isDrawingMode) updateBrush();
                        showToast('Stroke: ' + state.strokeWidth + 'px', 'info');
                        break;
                }
            }
        });

        // ============ CONTEXT MENU (Right Click) ============
        container.addEventListener('contextmenu', (e) => e.preventDefault());

        // ============ AUTO-SAVE ============
        setInterval(() => {
            localStorage.setItem('infinityboard_auto', JSON.stringify({
                canvas: canvas.toJSON(),
                bgColor: state.bgColor,
                bgPattern: state.bgPattern
            }));
        }, 30000);

        // ============ LOAD AUTO-SAVE ON START ============
        function loadAutoSave() {
            const autoSave = localStorage.getItem('infinityboard_auto');
            if (autoSave) {
                try {
                    const data = JSON.parse(autoSave);
                    if (data.canvas && data.canvas.objects && data.canvas.objects.length > 0) {
                        canvas.loadFromJSON(data.canvas, () => {
                            canvas.renderAll();
                            if (data.bgColor) state.bgColor = data.bgColor;
                            if (data.bgPattern) state.bgPattern = data.bgPattern;
                            updateBackground();
                            // Make all loaded objects selectable
                            canvas.forEachObject(o => {
                                o.selectable = true;
                                o.evented = true;
                            });
                            canvas.renderAll();
                        });
                    }
                } catch (err) {
                    console.log('No auto-save to load');
                }
            }
        }

        // ============ INIT ============
        initColorGrid();
        initBgColors();
        initPatterns();
        loadAutoSave();
        saveHistory();
        setTool('select'); // Start with select tool

        // Hide loading
        setTimeout(() => {
            document.getElementById('loading').classList.add('hide');
            showToast('Welcome to InfinityBoard! 🎨', 'success');
        }, 1200);

    })();
    </script>
</body>
</html>
